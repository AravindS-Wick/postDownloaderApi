# Fly.io configuration for SocialPostDownloader API
# Deploy with: fly deploy

app = "social-post-downloader-api"
primary_region = "sin"  # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "2500"
  # DATA_DIR points to the persistent volume
  DATA_DIR = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 2500
  force_https = true
  auto_stop_machines = false   # Keep always-on (no cold starts)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "social_post_data"
  destination = "/data"
  initial_size = "3gb"
